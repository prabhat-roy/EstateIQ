image:
  repository: estateiq/avm-service
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 50141
  targetPort: 50141

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

probes:
  liveness:
    httpGet:
      path: /healthz
      port: 50141
    initialDelaySeconds: 30
    periodSeconds: 20
  readiness:
    httpGet:
      path: /healthz
      port: 50141
    initialDelaySeconds: 10
    periodSeconds: 10

serviceAccount:
  create: true
  annotations: {}

podLabels:
  app.kubernetes.io/name: avm-service
  app.kubernetes.io/part-of: estateiq
  estateiq.io/domain: valuation
  estateiq.io/owner-team: valuation

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

env: []
envFrom: []

config:
  LOG_LEVEL: info
  AVM_MIN_CONFIDENCE: "0.65"

cloud:
  provider: ""
  storageClass: ""
  ingressClass: ""
