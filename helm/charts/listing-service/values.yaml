# Cloud-agnostic defaults for listing-service.
image:
  repository: estateiq/listing-service
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 3

service:
  type: ClusterIP
  port: 50040
  targetPort: 50040

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

probes:
  liveness:
    httpGet:
      path: /healthz
      port: 50040
    initialDelaySeconds: 30
    periodSeconds: 20
  readiness:
    httpGet:
      path: /healthz
      port: 50040
    initialDelaySeconds: 10
    periodSeconds: 10

serviceAccount:
  create: true
  annotations: {}

podLabels:
  app.kubernetes.io/name: listing-service
  app.kubernetes.io/part-of: estateiq
  estateiq.io/domain: listings
  estateiq.io/owner-team: listings

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

env: []
envFrom: []

config:
  LOG_LEVEL: info
  SPRING_PROFILES_ACTIVE: prod

cloud:
  provider: ""
  storageClass: ""
  ingressClass: ""
