cloud:
  provider: aws
  storageClass: gp3
  ingressClass: alb

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::{{ .Values.aws.accountId }}:role/estateiq-price-prediction

podAnnotations:
  iam.amazonaws.com/role: estateiq-price-prediction

envFrom:
  - secretRef:
      name: price-prediction-aws-secrets
