# Flux uses HelmReleases generated by an external tool; one HelmRelease per service.
# This file references the index HelmRelease that points at the directory.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata: { name: estateiq-platform, namespace: estateiq }
spec:
  interval: 5m
  chart:
    spec:
      chart: helm/charts/api-gateway
      sourceRef: { kind: GitRepository, name: estateiq, namespace: flux-system }
  valuesFrom:
    - kind: ConfigMap
      name: estateiq-cloud-overlay
      valuesKey: cloud-values.yaml