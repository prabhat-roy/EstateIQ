apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: pipeline-service
  namespace: estateiq
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis:
            templates: [{ templateName: estateiq-canary-analysis }]
            args:
              - { name: service-name, value: pipeline-service }
        - setWeight: 25
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  selector:
    matchLabels: { app.kubernetes.io/name: pipeline-service }
  template:
    metadata:
      labels: { app.kubernetes.io/name: pipeline-service }
    spec:
      containers:
        - name: pipeline-service
          image: harbor.estateiq.internal/estateiq/pipeline-service:latest
          ports: [{ containerPort: 8080 }]
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 15, periodSeconds: 30 }
