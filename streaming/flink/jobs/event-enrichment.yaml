apiVersion: flink.apache.org/v1beta1
kind: FlinkSessionJob
metadata: { name: estateiq-event-enrichment, namespace: estateiq }
spec:
  deploymentName: estateiq-flink
  job:
    jarURI: s3://estateiq-flink-jobs/event-enrichment.jar
    parallelism: 4
    upgradeMode: savepoint
    args: ["--source-topic", "estateiq.cdc.public.events", "--sink-topic", "estateiq.events.enriched"]
