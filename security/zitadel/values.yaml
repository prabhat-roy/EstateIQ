# ZITADEL — developer-platform auth (API keys, OAuth clients, dev portal SSO)
image: { repository: ghcr.io/zitadel/zitadel, tag: latest }
zitadel:
  externalDomain: zitadel.estateiq.internal
  externalSecure: true
  database: { postgres: { host: postgres.estateiq.svc, database: zitadel } }
ingress: { enabled: true, hosts: [{ host: zitadel.estateiq.internal }] }
