syntax = "proto3";

package estateiq.document.v1;

import "common/types.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.estateiq.document.v1";
option java_multiple_files = true;

// archive-service: Long-term contract archive
service ArchiveService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
