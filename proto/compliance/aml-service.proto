syntax = "proto3";

package estateiq.compliance.v1;

import "common/types.proto";
import "google/protobuf/timestamp.proto";

option java_package = "com.estateiq.compliance.v1";
option java_multiple_files = true;

// aml-service: AML screening (UK HMRC, EU AMLD6) — runs at deal initiation
service AmlService {
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}
message HealthResponse { string status = 1; string version = 2; google.protobuf.Timestamp checked_at = 3; }
