apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-sync
  namespace: estateiq
  labels:
    app.kubernetes.io/name: portal-sync
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: listings
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: portal-sync } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: portal-sync, estateiq.io/domain: listings }
    spec:
      serviceAccountName: portal-sync
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: portal-sync
          image: harbor.estateiq.internal/estateiq/portal-sync:latest
          ports: [{ containerPort: 50042, name: http }]
          envFrom: [{ configMapRef: { name: portal-sync } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50042 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50042 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
