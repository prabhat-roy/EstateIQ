apiVersion: apps/v1
kind: Deployment
metadata:
  name: virtual-tour
  namespace: estateiq
  labels:
    app.kubernetes.io/name: virtual-tour
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: listings
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: virtual-tour } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: virtual-tour, estateiq.io/domain: listings }
    spec:
      serviceAccountName: virtual-tour
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: virtual-tour
          image: harbor.estateiq.internal/estateiq/virtual-tour:latest
          ports: [{ containerPort: 50043, name: http }]
          envFrom: [{ configMapRef: { name: virtual-tour } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50043 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50043 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
