apiVersion: apps/v1
kind: Deployment
metadata:
  name: mls-syndicator
  namespace: estateiq
  labels:
    app.kubernetes.io/name: mls-syndicator
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: listings
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: mls-syndicator } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: mls-syndicator, estateiq.io/domain: listings }
    spec:
      serviceAccountName: mls-syndicator
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: mls-syndicator
          image: harbor.estateiq.internal/estateiq/mls-syndicator:latest
          ports: [{ containerPort: 50041, name: http }]
          envFrom: [{ configMapRef: { name: mls-syndicator } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50041 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50041 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
