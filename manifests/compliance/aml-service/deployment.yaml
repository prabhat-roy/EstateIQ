apiVersion: apps/v1
kind: Deployment
metadata:
  name: aml-service
  namespace: estateiq
  labels:
    app.kubernetes.io/name: aml-service
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: aml-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: aml-service, estateiq.io/domain: compliance }
    spec:
      serviceAccountName: aml-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: aml-service
          image: harbor.estateiq.internal/estateiq/aml-service:latest
          ports: [{ containerPort: 50220, name: http }]
          envFrom: [{ configMapRef: { name: aml-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50220 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50220 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
