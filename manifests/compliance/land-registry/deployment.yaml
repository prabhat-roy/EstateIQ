apiVersion: apps/v1
kind: Deployment
metadata:
  name: land-registry
  namespace: estateiq
  labels:
    app.kubernetes.io/name: land-registry
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: land-registry } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: land-registry, estateiq.io/domain: compliance }
    spec:
      serviceAccountName: land-registry
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: land-registry
          image: harbor.estateiq.internal/estateiq/land-registry:latest
          ports: [{ containerPort: 50223, name: http }]
          envFrom: [{ configMapRef: { name: land-registry } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50223 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50223 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
