apiVersion: apps/v1
kind: Deployment
metadata:
  name: sanction-screening
  namespace: estateiq
  labels:
    app.kubernetes.io/name: sanction-screening
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: compliance
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: sanction-screening } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: sanction-screening, estateiq.io/domain: compliance }
    spec:
      serviceAccountName: sanction-screening
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: sanction-screening
          image: harbor.estateiq.internal/estateiq/sanction-screening:latest
          ports: [{ containerPort: 50222, name: http }]
          envFrom: [{ configMapRef: { name: sanction-screening } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50222 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50222 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
