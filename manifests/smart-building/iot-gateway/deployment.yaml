apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-gateway
  namespace: estateiq
  labels:
    app.kubernetes.io/name: iot-gateway
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: smart-building
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: iot-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: iot-gateway, estateiq.io/domain: smart-building }
    spec:
      serviceAccountName: iot-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: iot-gateway
          image: harbor.estateiq.internal/estateiq/iot-gateway:latest
          ports: [{ containerPort: 50240, name: http }]
          envFrom: [{ configMapRef: { name: iot-gateway } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50240 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50240 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
