apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-integration
  namespace: estateiq
  labels:
    app.kubernetes.io/name: portal-integration
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: marketing
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: portal-integration } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: portal-integration, estateiq.io/domain: marketing }
    spec:
      serviceAccountName: portal-integration
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: portal-integration
          image: harbor.estateiq.internal/estateiq/portal-integration:latest
          ports: [{ containerPort: 50301, name: http }]
          envFrom: [{ configMapRef: { name: portal-integration } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50301 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
