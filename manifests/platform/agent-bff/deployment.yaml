apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-bff
  namespace: estateiq
  labels:
    app.kubernetes.io/name: agent-bff
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: agent-bff } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: agent-bff, estateiq.io/domain: platform }
    spec:
      serviceAccountName: agent-bff
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: agent-bff
          image: harbor.estateiq.internal/estateiq/agent-bff:latest
          ports: [{ containerPort: 50001, name: http }]
          envFrom: [{ configMapRef: { name: agent-bff } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50001 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50001 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
