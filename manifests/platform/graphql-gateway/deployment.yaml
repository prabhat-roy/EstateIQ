apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-gateway
  namespace: estateiq
  labels:
    app.kubernetes.io/name: graphql-gateway
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: platform
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: graphql-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: graphql-gateway, estateiq.io/domain: platform }
    spec:
      serviceAccountName: graphql-gateway
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: graphql-gateway
          image: harbor.estateiq.internal/estateiq/graphql-gateway:latest
          ports: [{ containerPort: 50005, name: http }]
          envFrom: [{ configMapRef: { name: graphql-gateway } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50005 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50005 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
