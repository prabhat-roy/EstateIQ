apiVersion: apps/v1
kind: Deployment
metadata:
  name: demand-heatmap
  namespace: estateiq
  labels:
    app.kubernetes.io/name: demand-heatmap
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: demand-heatmap } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: demand-heatmap, estateiq.io/domain: analytics }
    spec:
      serviceAccountName: demand-heatmap
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: demand-heatmap
          image: harbor.estateiq.internal/estateiq/demand-heatmap:latest
          ports: [{ containerPort: 50261, name: http }]
          envFrom: [{ configMapRef: { name: demand-heatmap } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50261 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
