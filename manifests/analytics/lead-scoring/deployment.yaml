apiVersion: apps/v1
kind: Deployment
metadata:
  name: lead-scoring
  namespace: estateiq
  labels:
    app.kubernetes.io/name: lead-scoring
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: lead-scoring } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: lead-scoring, estateiq.io/domain: analytics }
    spec:
      serviceAccountName: lead-scoring
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: lead-scoring
          image: harbor.estateiq.internal/estateiq/lead-scoring:latest
          ports: [{ containerPort: 50262, name: http }]
          envFrom: [{ configMapRef: { name: lead-scoring } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50262 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50262 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
