apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-analytics
  namespace: estateiq
  labels:
    app.kubernetes.io/name: market-analytics
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: analytics
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: market-analytics } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: market-analytics, estateiq.io/domain: analytics }
    spec:
      serviceAccountName: market-analytics
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: market-analytics
          image: harbor.estateiq.internal/estateiq/market-analytics:latest
          ports: [{ containerPort: 50260, name: http }]
          envFrom: [{ configMapRef: { name: market-analytics } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50260 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50260 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
