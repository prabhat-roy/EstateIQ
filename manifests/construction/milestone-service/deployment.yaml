apiVersion: apps/v1
kind: Deployment
metadata:
  name: milestone-service
  namespace: estateiq
  labels:
    app.kubernetes.io/name: milestone-service
    app.kubernetes.io/part-of: estateiq
    estateiq.io/domain: construction
spec:
  replicas: 2
  selector: { matchLabels: { app.kubernetes.io/name: milestone-service } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: milestone-service, estateiq.io/domain: construction }
    spec:
      serviceAccountName: milestone-service
      securityContext: { runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000 }
      containers:
        - name: milestone-service
          image: harbor.estateiq.internal/estateiq/milestone-service:latest
          ports: [{ containerPort: 50141, name: http }]
          envFrom: [{ configMapRef: { name: milestone-service } }]
          livenessProbe:  { httpGet: { path: /healthz, port: 50141 }, initialDelaySeconds: 15 }
          readinessProbe: { httpGet: { path: /healthz, port: 50141 }, initialDelaySeconds: 5 }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1000m, memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
