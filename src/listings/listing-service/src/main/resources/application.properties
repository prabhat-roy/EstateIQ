spring.application.name=listing-service
server.port=${PORT:50040}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true

# PostGIS-backed geometry columns on properties.
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:estateiq}
spring.datasource.username=${POSTGRES_USER:app}
spring.datasource.password=${POSTGRES_PASSWORD:app}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
