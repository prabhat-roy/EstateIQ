spring.application.name=trust-account-service
server.port=${PORT:50224}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:estateiq}
spring.datasource.username=${POSTGRES_USER:app}
spring.datasource.password=${POSTGRES_PASSWORD:app}

# Append-only enforcement at JPA + DB triggers (see databases/postgres/finance/V1__init.sql)
spring.jpa.hibernate.ddl-auto=validate
